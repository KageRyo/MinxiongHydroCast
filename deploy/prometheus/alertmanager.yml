global:
  resolve_timeout: 5m

route:
  receiver: operations-audit
  group_by:
    - alertname
    - dataset
  group_wait: 10s
  group_interval: 5m
  repeat_interval: 4h

receivers:
  - name: operations-audit
    webhook_configs:
      - url: http://127.0.0.1:9087/alerts
        send_resolved: true
