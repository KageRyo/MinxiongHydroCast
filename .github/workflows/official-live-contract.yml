name: Official Live Contracts

on:
  workflow_dispatch:
  schedule:
    - cron: "17 1 * * *"

permissions:
  contents: read

jobs:
  official-observations:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CWA_API_KEY: ${{ secrets.CWA_API_KEY }}
      WRA_API_KEY: ${{ secrets.WRA_API_KEY }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Require official API secrets
        run: |
          if [ -z "$CWA_API_KEY" ]; then
            echo "::error::Repository secret CWA_API_KEY is required"
            exit 1
          fi
          if [ -z "$WRA_API_KEY" ]; then
            echo "::error::Repository secret WRA_API_KEY is required"
            exit 1
          fi

      - name: Install service
        run: python -m pip install .

      - name: Validate CWA rain-gauge contract
        run: floodcast-minxiong-cwa-rain-smoke --county 10010 --county-name 嘉義縣

      - name: Validate WRA rainfall-warning contract
        run: floodcast-minxiong-wra-alert-smoke --county 10010

      - name: Validate WRA IoW flood-sensor contracts
        run: floodcast-minxiong-wra-flood-smoke --county 10010
