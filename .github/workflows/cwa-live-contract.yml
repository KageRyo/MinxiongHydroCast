name: Official Live Contracts

on:
  workflow_dispatch:
  schedule:
    - cron: "17 1 * * *"

permissions:
  contents: read

jobs:
  public-official-observations:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CWA_API_KEY: ${{ secrets.CWA_API_KEY }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.11"
          cache: pip

      - name: Require official API secrets
        run: |
          if [ -z "$CWA_API_KEY" ]; then
            echo "::error::Repository secret CWA_API_KEY is required"
            exit 1
          fi

      - name: Install service
        run: python -m pip install .

      - name: Validate CWA rain-gauge contract
        run: minxiong-hydrocast-cwa-rain-smoke --county 10010 --county-name 嘉義縣

      - name: Validate WRA IoW flood-sensor contracts
        run: minxiong-hydrocast-wra-flood-smoke --county 10010

  host-bound-wra-warning:
    runs-on: [self-hosted, linux, x64, minxiong-hydrocast]
    timeout-minutes: 10
    env:
      WRA_API_KEY: ${{ secrets.WRA_API_KEY }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Require WRA API secret and host runtime
        run: |
          if [ -z "$WRA_API_KEY" ]; then
            echo "::error::Repository secret WRA_API_KEY is required"
            exit 1
          fi
          test -x "$HOME/.local/share/minxiong-hydrocast/venv/bin/python" || {
            echo "::error::MinxiongHydroCast host runtime is not installed"
            exit 1
          }

      - name: Validate WRA rainfall-warning contract
        env:
          PYTHONPATH: src
        run: |
          "$HOME/.local/share/minxiong-hydrocast/venv/bin/python" \
            -m minxionghydrocast.ingestion.wra_rainfall_alert_api \
            --county 10010
